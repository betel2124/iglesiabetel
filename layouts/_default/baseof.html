<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.descripcion }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.descripcion }}{{ else }}{{ .Description | default .Site.Params.descripcion }}{{ end }}">

  {{/* Open Graph */}}
  <meta property="og:title" content="{{ .Title }} — {{ .Site.Title }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:description" content="{{ .Site.Params.descripcion }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  {{ block "head" . }}{{ end }}

  {{/* Netlify Identity – only loaded when needed */}}
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body data-timezone="{{ .Site.Params.timezone | default "America/Argentina/Buenos_Aires" }}">

  {{ partial "nav.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script src="/js/main.js"></script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
