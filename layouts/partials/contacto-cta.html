{{ $p := .Site.Params }}
<section class="section" style="background:var(--white);">
  <div class="section-inner">
    <div style="display:grid;grid-template-columns:1fr 1fr;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-lg);">
      <div style="background:var(--black);padding:56px 48px;position:relative;overflow:hidden;">
        <div style="position:absolute;bottom:-60px;right:-60px;width:300px;height:300px;border-radius:50%;border:1px solid rgba(157,175,99,0.15);"></div>
        <h2 style="font-family:var(--font-h);font-size:32px;color:white;font-weight:700;line-height:1.2;margin-bottom:24px;position:relative;z-index:1;">
          &iquest;Quer&eacute;s conocernos?<br>Te <em style="color:var(--red);">esperamos.</em>
        </h2>
        <div style="position:relative;z-index:1;">
          <div style="display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.07);">
            <div style="width:36px;height:36px;background:rgba(157,175,99,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="#fff" d="M12 21s-6-5.6-6-11a6 6 0 1 1 12 0c0 5.4-6 11-6 11Zm0-8.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/></svg>
            </div>
            <div>
              <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--green);font-weight:600;margin-bottom:2px;">Direcci&oacute;n</div>
              <div style="font-size:14px;color:rgba(255,255,255,0.75);">{{ $p.direccion }}</div>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.07);">
            <div style="width:36px;height:36px;background:rgba(157,175,99,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="#fff" d="M7 2v2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2H7Zm12 8H5v8h14v-8Z"/></svg>
            </div>
            <div>
              <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--green);font-weight:600;margin-bottom:2px;">Horarios</div>
              <div style="font-size:14px;color:rgba(255,255,255,0.75);">Domingo {{ $p.horario_domingo }} &middot; Jueves {{ $p.horario_jueves }}</div>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:16px 0;">
            <div style="width:36px;height:36px;background:rgba(157,175,99,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="#fff" d="M6.6 10.8c1.5 3 3.9 5.3 6.9 6.9l2.3-2.3c.3-.3.8-.4 1.2-.3 1 .3 2.1.5 3.2.5.7 0 1.3.6 1.3 1.3V20c0 .7-.6 1.3-1.3 1.3C10.7 21.3 2.7 13.3 2.7 3.3 2.7 2.6 3.3 2 4 2h3.1c.7 0 1.3.6 1.3 1.3 0 1.1.2 2.2.5 3.2.1.4 0 .9-.3 1.2l-2 2.1Z"/></svg>
            </div>
            <div>
              <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--green);font-weight:600;margin-bottom:2px;">WhatsApp</div>
              <div style="font-size:14px;color:rgba(255,255,255,0.75);"><a href="https://wa.me/{{ $p.whatsapp }}" style="color:inherit;">{{ $p.telefono }}</a></div>
            </div>
          </div>
        </div>
      </div>
      <div style="background:var(--beige);padding:56px 48px;display:flex;flex-direction:column;justify-content:center;">
        <div style="font-family:var(--font-h);font-size:22px;color:var(--black);font-weight:600;margin-bottom:24px;">Escribinos</div>
        <div style="margin-bottom:16px;">
          <label for="cta-contact-name" style="display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:6px;">Tu nombre</label>
          <input id="cta-contact-name" type="text" placeholder="Juan Garc&iacute;a" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:white;font-family:var(--font-b);font-size:14px;color:var(--black);outline:none;">
        </div>
        <div style="margin-bottom:20px;">
          <label for="cta-contact-message" style="display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:6px;">Mensaje</label>
          <textarea id="cta-contact-message" placeholder="&iquest;En qu&eacute; podemos ayudarte?" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:white;font-family:var(--font-b);font-size:14px;color:var(--black);outline:none;resize:vertical;min-height:100px;"></textarea>
        </div>
        <a
          href="https://wa.me/{{ $p.whatsapp }}"
          class="btn btn-primary js-contact-channel"
          data-channel="whatsapp"
          data-whatsapp="{{ $p.whatsapp }}"
          data-email="{{ $p.email }}"
          data-instagram="{{ $p.instagram }}"
          data-facebook="{{ $p.facebook }}"
          style="width:100%;justify-content:center;margin-bottom:18px;"
        >
          Enviar por WhatsApp
        </a>
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">Tambi&eacute;n pod&eacute;s comunicarte por</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <a
            href="{{ with $p.facebook }}{{ . }}{{ else }}#{{ end }}"
            class="js-contact-channel"
            data-channel="facebook"
            data-whatsapp="{{ $p.whatsapp }}"
            data-email="{{ $p.email }}"
            data-instagram="{{ $p.instagram }}"
            data-facebook="{{ $p.facebook }}"
            aria-label="Facebook"
            title="Facebook"
            style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:white;border:1.5px solid var(--border);color:var(--black);text-decoration:none;{{ if not $p.facebook }}opacity:.45;pointer-events:none;{{ end }}"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.3-1.6 1.6-1.6h1.7V4.8c-.3 0-1.3-.1-2.4-.1-2.4 0-4 1.4-4 4.2V11H8v3h2.4v8h3.1Z"/></svg>
          </a>
          <a
            href="{{ with $p.instagram }}{{ . }}{{ else }}#{{ end }}"
            class="js-contact-channel"
            data-channel="instagram"
            data-whatsapp="{{ $p.whatsapp }}"
            data-email="{{ $p.email }}"
            data-instagram="{{ $p.instagram }}"
            data-facebook="{{ $p.facebook }}"
            aria-label="Instagram"
            title="Instagram"
            style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:white;border:1.5px solid var(--border);color:var(--black);text-decoration:none;{{ if not $p.instagram }}opacity:.45;pointer-events:none;{{ end }}"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7Zm10.5 1.6a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6Z"/></svg>
          </a>
          <a
            href="mailto:{{ $p.email }}"
            class="js-contact-channel"
            data-channel="email"
            data-whatsapp="{{ $p.whatsapp }}"
            data-email="{{ $p.email }}"
            data-instagram="{{ $p.instagram }}"
            data-facebook="{{ $p.facebook }}"
            aria-label="Email"
            title="Email"
            style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:white;border:1.5px solid var(--border);color:var(--black);text-decoration:none;{{ if not $p.email }}opacity:.45;pointer-events:none;{{ end }}"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 2v.4l9 5.8 9-5.8V7H3Zm18 10V9.7l-8.5 5.5a1 1 0 0 1-1 0L3 9.7V17h18Z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
