backend:
  name: git-gateway
  branch: main

media_folder: "static/img/uploads"
public_folder: "/img/uploads"

# Locale
locale: "es"

collections:

  # ── PREDICACIONES ──────────────────────────────────────────────
  - name: "predicaciones"
    label: "Predicaciones"
    label_singular: "Predicación"
    folder: "content/predicaciones"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{predicador}} ({{date | date('DD/MM/YYYY')}})"
    sortable_fields: ["date", "title", "serie"]
    fields:
      - { label: "Título", name: "title", widget: "string",
          hint: "Ej: El fuego que no se apaga" }
      - { label: "Fecha", name: "date", widget: "datetime",
          format: "YYYY-MM-DD", date_format: "DD/MM/YYYY",
          time_format: false }
      - { label: "Predicador", name: "predicador", widget: "string",
          hint: "Ej: Pr. Juan García" }
      - { label: "Serie", name: "serie", widget: "select",
          options: ["vida-en-el-espiritu", "el-sermon-del-monte",
                    "raices-fe-y-familia", "sin-serie"],
          default: "sin-serie",
          hint: "Serie a la que pertenece este mensaje" }
      - { label: "Número en la serie", name: "serie_ep", widget: "number",
          required: false, hint: "Ej: 3 (para 'Episodio 3')" }
      - { label: "Pasaje bíblico", name: "pasaje", widget: "string",
          hint: "Ej: Hechos 2:1–4" }
      - { label: "Duración", name: "duracion", widget: "string",
          hint: "Ej: 48 min", required: false }
      - { label: "Link de YouTube", name: "youtube_url", widget: "string",
          hint: "URL completa del video en YouTube",
          required: false }
      - { label: "ID de YouTube", name: "youtube_id", widget: "string",
          hint: "Solo el ID del video (lo que va después de ?v=). Ej: dQw4w9WgXcQ",
          required: false }
      - { label: "¿Predicación destacada?", name: "destacado",
          widget: "boolean", default: false,
          hint: "Si está activado, aparece primero en la lista" }
      - { label: "Tags", name: "tags", widget: "list",
          allow_add: true, required: false,
          hint: "Ej: espiritu-santo, familia, evangelismo" }
      - { label: "Resumen e información adicional", name: "body",
          widget: "markdown",
          hint: "Resumen del mensaje, notas, o información adicional. Opcional." }

  # ── EVENTOS ────────────────────────────────────────────────────
  - name: "eventos"
    label: "Eventos"
    label_singular: "Evento"
    folder: "content/eventos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date | date('DD/MM/YYYY')}} [{{estado}}]"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha del evento", name: "date", widget: "datetime",
          format: "YYYY-MM-DD", date_format: "DD/MM/YYYY",
          time_format: false }
      - { label: "Hora", name: "hora", widget: "string",
          hint: "Ej: 20:00 hs" }
      - { label: "Lugar", name: "lugar", widget: "string",
          hint: "Ej: Salón principal" }
      - { label: "Tipo", name: "tipos", widget: "select",
          options:
            - { label: "Culto especial", value: "culto-especial" }
            - { label: "Jóvenes", value: "jovenes" }
            - { label: "Evangelismo", value: "evangelismo" }
            - { label: "Retiro", value: "retiro" }
            - { label: "Conferencia", value: "conferencia" }
            - { label: "Damas", value: "damas" }
            - { label: "Varones", value: "varones" }
            - { label: "Niños", value: "ninos" }
            - { label: "General", value: "general" }
          default: "general" }
      - { label: "Estado", name: "estado", widget: "select",
          options:
            - { label: "Próximo", value: "proximo" }
            - { label: "Realizado", value: "realizado" }
          default: "proximo" }
      - { label: "Entrada", name: "entrada", widget: "string",
          default: "Libre y gratuita", required: false }
      - { label: "¿Mostrar en inicio?", name: "destacado",
          widget: "boolean", default: true }
      - { label: "Link de Instagram (story/post)", name: "instagram_url",
          widget: "string", required: false,
          hint: "URL directa a la publicación o highlight de Instagram" }
      - { label: "Descripción previa", name: "body", widget: "markdown",
          hint: "Descripción del evento antes de que ocurra. Puede incluir info de inscripción, qué llevar, etc." }
      - { label: "Crónica (post-evento)", name: "cronica",
          widget: "markdown", required: false,
          hint: "Opcional. Lo que pasó después del evento. Solo completar si hay algo para contar." }

  # ── MINISTERIOS ────────────────────────────────────────────────
  - name: "ministerios"
    label: "Ministerios"
    label_singular: "Ministerio"
    folder: "content/ministerios"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Nombre", name: "title", widget: "string" }
      - { label: "Orden de aparición", name: "weight", widget: "number",
          default: 10, hint: "Número menor = aparece primero" }
      - { label: "Ícono (emoji)", name: "icon", widget: "string",
          hint: "Ej: ⚡ 👶 🎵" }
      - { label: "Color de tarjeta", name: "color", widget: "select",
          options: ["red", "green", "dark", "orange", "green2", "gray"],
          default: "green" }
      - { label: "Día de reunión", name: "dia", widget: "string",
          hint: "Ej: Viernes", required: false }
      - { label: "Horario", name: "hora", widget: "string",
          hint: "Ej: 20:30 hs", required: false }
      - { label: "Rango de edad", name: "edad", widget: "string",
          required: false, hint: "Ej: 13 a 30 años" }
      - { label: "¿Es el ministerio destacado?", name: "destacado",
          widget: "boolean", default: false,
          hint: "Solo uno debería estar destacado (aparece grande arriba)" }
      - { label: "Descripción", name: "body", widget: "markdown",
          hint: "Descripción completa del ministerio." }

  # ── PÁGINAS ESTÁTICAS ──────────────────────────────────────────
  - name: "paginas"
    label: "Páginas"
    label_singular: "Página"
    files:

      - label: "Página de Inicio"
        name: "inicio"
        file: "content/_index.md"
        fields:
          - { label: "Hero — Título línea 1", name: "hero_titulo", widget: "string",
              default: "Un Hogar para Crecer." }
          - { label: "Hero — Título línea 2 (en rojo itálico)", name: "hero_titulo2",
              widget: "string", default: "Una Familia para Acompañar." }
          - { label: "Hero — Subtítulo", name: "hero_subtitulo", widget: "text" }
          - { label: "Sección visión — Texto", name: "vision_texto",
              widget: "markdown" }
          - { label: "Años de ministerio", name: "anios", widget: "number",
              default: 15 }

      - label: "Nosotros"
        name: "nosotros"
        file: "content/nosotros/_index.md"
        fields:
          - { label: "Título de página", name: "title", widget: "string",
              default: "Nosotros" }
          - { label: "Visión", name: "vision", widget: "markdown" }
          - { label: "Misión", name: "mision", widget: "markdown" }
          - { label: "Historia", name: "historia", widget: "markdown" }
          - { label: "Texto de afiliación", name: "afiliacion",
              widget: "markdown" }

  # ── CONFIGURACIÓN GENERAL ──────────────────────────────────────
  - name: "config"
    label: "Configuración del sitio"
    files:
      - label: "Información de contacto y horarios"
        name: "contacto"
        file: "data/contacto.yaml"
        fields:
          - { label: "Dirección", name: "direccion", widget: "string" }
          - { label: "Teléfono / WhatsApp", name: "telefono", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "YouTube URL", name: "youtube", widget: "string" }
          - { label: "Horario domingo", name: "horario_domingo", widget: "string" }
          - { label: "Horario miércoles", name: "horario_miercoles", widget: "string" }
          - { label: "Horario viernes", name: "horario_viernes", widget: "string" }
